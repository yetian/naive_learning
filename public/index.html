<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seed-Intelligence | 生长型具身智能</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header>
      <div class="logo">
        <span class="seed">🌱</span>
        <h1>Seed-Intelligence</h1>
      </div>
      <p class="subtitle">基于本体论驱动的生长型具身智能实验原型</p>
    </header>

    <!-- 输入区域 -->
    <section class="input-section">
      <div class="input-group">
        <label for="seed-concept">注入初始本体</label>
        <div class="input-row">
          <input
            type="text"
            id="seed-concept"
            placeholder="输入一个概念，如：水、编程、智能..."
            autocomplete="off"
          >
          <button id="start-btn" class="primary-btn">
            <span class="btn-text">开始学习</span>
            <span class="btn-loading" style="display:none;">学习中...</span>
          </button>
        </div>
      </div>
      <div class="options">
        <label>
          <input type="checkbox" id="auto-learn" checked>
          自动传播学习（发现新概念后自动学习）
        </label>
      </div>
    </section>

    <!-- 状态显示 -->
    <section class="status-section" id="status-section" style="display:none;">
      <div class="status-bar">
        <span class="status-label">学习状态:</span>
        <span class="status-text" id="status-text">等待中</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="learned-list">
        <span>已学习:</span>
        <span id="learned-concepts">-</span>
      </div>
    </section>

    <!-- 大脑可视化 -->
    <section class="brain-section">
      <h2>🧠 大脑生长状态图</h2>
      <div class="brain-stats">
        <span>概念数: <strong id="concept-count">0</strong></span>
        <span>关联数: <strong id="relation-count">0</strong></span>
        <button id="refresh-brain" class="small-btn">刷新</button>
        <button id="clear-brain" class="small-btn danger">清空知识库</button>
      </div>
      <div id="brain-viz" class="brain-viz"></div>
    </section>

    <!-- 问答区域 -->
    <section class="chat-section">
      <h2>💬 智能问答</h2>
      <div class="chat-container">
        <div id="chat-messages" class="chat-messages">
          <div class="message bot">
            你好！我是 Seed-Intelligence。请先输入一个初始概念让我学习，然后我们就可以聊天了。
          </div>
        </div>
        <div class="chat-input">
          <input
            type="text"
            id="question-input"
            placeholder="问我任何问题..."
            autocomplete="off"
          >
          <button id="send-btn" class="primary-btn">发送</button>
        </div>
      </div>
    </section>

    <!-- 语言生成实验室 -->
    <section class="lm-section">
      <h2>🧪 语言生成实验室</h2>
      <div class="lm-container">
        <div class="lm-controls">
          <input type="text" id="lm-prompt" placeholder="输入起始句子..." autocomplete="off">
          <button id="train-lm-btn" class="secondary-btn">训练模型</button>
          <button id="generate-btn" class="primary-btn">生成</button>
        </div>
        <div class="lm-training">
          <label>
            训练轮数:
            <input type="number" id="lm-epochs" value="3" min="1" max="10">
          </label>
          <label>
            温度:
            <input type="number" id="lm-temp" value="0.8" min="0.1" max="2" step="0.1">
          </label>
        </div>
        <div class="lm-input">
          <textarea id="lm-training-text" placeholder="粘贴要训练的文本（可以用电子书内容）..."></textarea>
        </div>
        <div id="lm-output" class="lm-output">
          生成结果将显示在这里...
        </div>
      </div>
    </section>

    <!-- 底部 -->
    <footer>
      <p>Seed-Intelligence v1.0 | 验证智能是否可以通过"起点→搜索→归纳→固化"循环从零生长</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
